version: '3.9'

services:
  # ============================================================
  # FRONTEND (Next.js)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: omnitask-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:4000/api
      - NEXT_PUBLIC_WS_URL=http://backend:4000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    networks:
      - omnitask-network
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================
  # BACKEND (Node.js API - if you have one)
  # ============================================================
  backend:
    image: node:20-alpine
    container_name: omnitask-backend
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/omnitask
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
    networks:
      - omnitask-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # POSTGRESQL DATABASE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: omnitask-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnitask
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - omnitask-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # REDIS (for queues, caching, sessions)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: omnitask-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - omnitask-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # NGINX (Reverse Proxy)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: omnitask-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - omnitask-network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  omnitask-network:
    driver: bridge